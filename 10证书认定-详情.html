<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1848, initial-scale=1.0">
    <title>证书认定详情页 - 体验优化版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tdesign-vue@latest/dist/tdesign.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tdesign-icons-vue@latest/dist/fonts/t-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
    <style>
        :root {
            --brand-color: #0052D9;
            --brand-hover: #2365e3;
            --bg-page: #f5f6f8;
            --bg-card: #ffffff;
            --text-main: rgba(0,0,0,0.9);
            --text-secondary: rgba(0,0,0,0.6);
            --text-placeholder: rgba(0,0,0,0.4);
            --border-light: #eaebec;
            --danger-color: #d54941;
            --warning-color: #e37318;
            --success-color: #2ba471;
            --radius-md: 8px;
            --radius-sm: 4px;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--bg-page); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: auto;
            color: var(--text-main);
        }
        
        .workspace-container {
            width: 1848px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航条 */
        .top-header {
            background: var(--bg-card);
            padding: 0 24px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            z-index: 10;
            position: sticky;
            top: 0;
        }

        /* 调整为上下分区布局 - 不限制高度 */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 24px;
            box-sizing: border-box;
        }

        /* 卡片基础样式优化 - 移除高度限制 */
        .t-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }
        
        .t-card__header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            flex-shrink: 0;
            z-index: 2;
        }
        
        .t-card__body {
            flex: 1;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: #d9d9d9 transparent;
        }

        /* 表格优化 */
        .t-table { width: 100%; border-collapse: collapse; }
        .t-table th {
            background: #fafafa; color: var(--text-secondary); font-weight: 500;
            padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border-light);
            font-size: 14px; position: sticky; top: 0; z-index: 1;
        }
        .t-table td {
            padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
            font-size: 14px; vertical-align: top; line-height: 1.5;
        }
        .t-table tr:hover { background: #fafafa; }

        /* 标签精细化 */
        .t-tag {
            display: inline-flex; align-items: center; padding: 2px 8px;
            border-radius: 4px; font-size: 12px; font-weight: 500; border: 1px solid transparent;
        }
        .t-tag--primary { background: #e6f4ff; color: var(--brand-color); border-color: #91caff; }
        .t-tag--success { background: #e3f9e9; color: var(--success-color); border-color: #94d8af; }
        .t-tag--danger { background: #fff2f1; color: var(--danger-color); border-color: #ffb6b1; }
        .t-tag--warning { background: #fff1e9; color: var(--warning-color); border-color: #ffcda8; }

        .standards-tag {
            display: inline-block; background: #f6ffed; color: var(--success-color);
            padding: 4px 10px; border-radius: 4px; font-size: 12px;
            border: 1px solid #94d8af; line-height: 1.4; margin: 2px;
        }

        /* 按钮体系 - 带图标 */
        .t-button {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 0 20px; height: 36px; border-radius: 4px; font-size: 14px;
            cursor: pointer; border: 1px solid transparent; transition: all 0.2s; font-weight: 500;
        }
        .t-button--primary { background: var(--brand-color); color: white; }
        .t-button--primary:hover { background: var(--brand-hover); }
        .t-button--danger { background: var(--danger-color); color: white; }
        .t-button--danger:hover { background: #e34d59; }
        .t-button--ghost { background: transparent; border-color: #d9d9d9; color: var(--text-main); }
        .t-button--ghost:hover { border-color: var(--brand-color); color: var(--brand-color); }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(2px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; border-radius: 12px; width: 600px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column;
            max-height: 85vh;
        }
        .modal-header {
            padding: 18px 24px; border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 12px 12px 0 0;
        }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 16px 24px; border-top: 1px solid var(--border-light);
            display: flex; justify-content: flex-end; gap: 12px; background: #fafafa;
            border-radius: 0 0 12px 12px;
        }
        
        /* 表单元素优化 */
        .form-item { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500; font-size: 14px; }
        .t-input, .t-select, .t-textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9;
            border-radius: 4px; font-size: 14px; transition: all 0.2s; box-sizing: border-box; font-family: inherit;
        }
        .t-input:focus, .t-select:focus, .t-textarea:focus {
            outline: none; border-color: var(--brand-color); box-shadow: 0 0 0 2px rgba(0,82,217,0.1);
        }
        .t-textarea { resize: vertical; min-height: 80px; }
        
        .missing-item-box {
            background: #fafafa; border: 1px solid var(--border-light); border-radius: 8px;
            padding: 16px; margin-bottom: 16px; transition: all 0.2s;
        }
        .missing-item-box:hover { border-color: #d9d9d9; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 500; }
        .delete-btn { color: var(--danger-color); cursor: pointer; font-size: 13px; }
        
        .add-btn {
            width: 100%; padding: 12px; border: 1px dashed #d9d9d9; background: white;
            color: var(--text-secondary); border-radius: 4px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .add-btn:hover { border-color: var(--brand-color); color: var(--brand-color); background: #f0f5ff; }
        
        .arrow-icon { transition: transform 0.3s; }
        .arrow-icon.expanded { transform: rotate(180deg); }
        
        /* 状态标签样式 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 12px;
        }
        .status-tag.approved {
            background: #e3f9e9;
            color: var(--success-color);
            border: 1px solid #94d8af;
        }
        .status-tag.rejected {
            background: #fff2f1;
            color: var(--danger-color);
            border: 1px solid #ffb6b1;
        }
        .status-tag.pending {
            background: #e6f4ff;
            color: var(--brand-color);
            border: 1px solid #91caff;
        }
        .status-tag.missing {
            background: #fff1e9;
            color: var(--warning-color);
            border: 1px solid #ffcda8;
        }

        /* 新增：归档材料左右分栏布局 */
        .material-layout {
            display: flex;
            height: 600px;
            border-top: 1px solid var(--border-light);
        }
        
        /* 左侧目录树 */
        .material-sidebar {
            width: 280px;
            background: #fafafa;
            border-right: 1px solid var(--border-light);
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .tree-node {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            user-select: none;
        }
        
        .tree-node:hover {
            background: #f0f0f0;
            color: var(--text-main);
        }
        
        .tree-node.active {
            background: #e6f4ff;
            color: var(--brand-color);
            font-weight: 600;
        }
        
        .tree-node .arrow {
            transition: transform 0.2s;
            font-size: 16px;
        }
        
        .tree-node .arrow.expanded {
            transform: rotate(90deg);
        }
        
        .tree-node.level-1 {
            padding-left: 32px;
        }
        
        .tree-node.level-2 {
            padding-left: 48px;
            font-size: 13px;
        }
        
        .tree-icon {
            font-size: 16px;
        }
        
        /* 右侧文件列表区 */
        .material-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #fff;
        }
        
        .content-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        
        /* 子分类卡片样式（用于右侧展示） */
        .subcategory-section {
            margin-bottom: 24px;
        }
        
        .subcategory-title {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* 文件项样式 - 复用原有样式但调整布局 */
        .material-item {
            display: flex; 
            align-items: center; 
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            background: #fff; 
            transition: all 0.2s;
            gap: 12px;
            margin-bottom: 8px;
        }
        .material-item:hover {
            border-color: var(--brand-color);
            box-shadow: 0 2px 8px rgba(0,82,217,0.08);
            transform: translateY(-1px);
        }
        .material-item.warning { 
            background: #fff8f7; 
            border: 1px dashed #ffb6b1; 
        }
        .material-item.warning:hover { 
            border-color: var(--danger-color); 
        }
        .material-item.warning .material-name { 
            color: var(--danger-color); 
        }

        /* 文件类型标签 - 紧跟文件名称 */
        .file-type-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: 500;
            margin-left: 8px;
            flex-shrink: 0;
        }
        /* 附件类型 - 蓝色主题 */
        .file-type-badge.pdf { 
            background: #e6f4ff; 
            color: var(--brand-color);
        }
        /* 表单类型 - 绿色主题 */
        .file-type-badge.form { 
            background: #e3f9e9; 
            color: var(--success-color);
        }

        /* 文件图标容器 */
        .file-icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .file-icon-wrapper.pdf {
            background: #e6f4ff;
            color: var(--brand-color);
        }
        .file-icon-wrapper.form {
            background: #e3f9e9;
            color: var(--success-color);
        }
        .file-icon-wrapper .t-icon {
            font-size: 20px;
        }
        .material-item.warning .file-icon-wrapper {
            background: #fff2f1 !important;
            color: var(--danger-color) !important;
        }

        /* 预览按钮 */
        .preview-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
            margin-left: auto;
        }
        .preview-btn:hover {
            background: #f0f5ff;
            color: var(--brand-color);
            border-color: var(--brand-color);
        }

        /* 缺失提示标签 */
        .missing-label {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #fff2f1;
            color: var(--danger-color);
            font-size: 12px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 500;
            border: 1px solid #ffb6b1;
        }
        
        .empty-tip {
            text-align: center;
            color: var(--text-placeholder);
            padding: 60px 0;
            font-size: 14px;
        }
    
        /* 树形结构层级样式 */
        .tree-container {
            padding: 8px 0;
        }

        .tree-node-root {
            padding-left: 8px;
        }

        .tree-children {
            position: relative;
        }

        .tree-children.level-1 {
            padding-left: 16px;
            margin-left: 8px;
            border-left: 1px dashed #e0e0e0;
        }

        .tree-children.level-2 {
            padding-left: 20px;
            margin-left: 12px;
            border-left: 1px dashed #e0e0e0;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .tree-node-wrapper {
            margin-bottom: 4px;
        }

        .tree-node {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            user-select: none;
            border-radius: 4px;
            margin-right: 8px;
        }

        .tree-node:hover {
            background: #f0f0f0;
            color: var(--text-main);
        }

        .tree-node.active {
            background: #e6f4ff;
            color: var(--brand-color);
            font-weight: 600;
        }

        .tree-node .arrow {
            transition: transform 0.2s;
            font-size: 16px;
            margin-right: 4px;
        }

        .tree-node .arrow.expanded {
            transform: rotate(90deg);
        }

        .tree-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

    
        /* 补充材料相关样式 */
        .subcategory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .subcategory-subtitle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .subcategory-item {
            margin-bottom: 20px;
            padding: 16px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .add-material-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border: 1px dashed var(--brand-color);
            background: white;
            color: var(--brand-color);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-material-btn:hover {
            background: var(--brand-color);
            color: white;
        }

        .file-type-badge.supplementary {
            background: #fff1e9;
            color: var(--warning-color);
        }

        .file-icon-wrapper.supplementary {
            background: #fff1e9;
            color: var(--warning-color);
        }

        .supplementary-label {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 500;
            border: 1px solid;
        }

        .supplementary-label.pending {
            background: #fff2f1;
            color: var(--danger-color);
            border-color: #ffb6b1;
        }

        .supplementary-label.submitted {
            background: #e6f4ff;
            color: var(--brand-color);
            border-color: #91caff;
        }

        /* 添加材料弹窗 */
        .add-material-modal .modal-content {
            width: 500px;
        }

        .add-material-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-row input,
        .form-row textarea {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-row input:focus,
        .form-row textarea:focus {
            outline: none;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 2px rgba(0,82,217,0.1);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-placeholder);
            margin-top: 4px;
        }

    </style>
</head>
<body>

<div class="workspace-container">
    <header class="top-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <button class="t-button t-button--ghost" style="border: none; padding: 0 8px; height: 32px; box-shadow: none; background: transparent;" onclick="history.back()">
                <i class="t-icon t-icon-arrow-left"></i> 返回
            </button>
            <div style="width: 1px; height: 16px; background: var(--border-light);"></div>
            <div style="font-size: 16px; font-weight: 600; display: flex; align-items: center;">
                证书认定详情
                <span style="margin-left: 12px; color: var(--text-placeholder); font-weight: normal; font-size: 14px;">
                    任务号：<span id="taskNoDisplay">TA2024001</span>
                    <span style="margin: 0 8px;">|</span>
                    领域：<span id="currentDomainDisplay">加载中...</span>
                </span>
                <span id="domainStatusTag" class="status-tag pending">待审核</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;" id="headerActions">
            <button class="t-button t-button--primary" style="height: 36px;" onclick="approveDomain()">
                <i class="fas fa-check"></i> 认证通过
            </button>
            <button class="t-button t-button--ghost" style="height: 36px; color: var(--danger-color); border-color: var(--danger-color);" onclick="rejectDomain()">
                <i class="fas fa-xmark"></i> 不予通过
            </button>
        </div>
    </header>

    <div class="main-layout">
        <!-- 上半部分：证书列表（保持不变） -->
        <div class="t-card cert-card">
            <div class="t-card__header">
                <div>
                    <h2 style="margin: 0 0 4px 0; font-size: 18px; font-weight: 600;">证书列表</h2>
                    <span style="color: var(--text-placeholder); font-size: 13px; font-weight: normal;">
                        本领域共 <strong style="color: var(--brand-color);" id="certCount">0</strong> 张相关证书
                    </span>
                </div>
            </div>
            <div class="t-card__body">
                <table class="t-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">序号</th>
                            <th style="width: 250px;">证书标题</th>
                            <th style="width: 180px;">证书编号</th>
                            <th style="width: 120px;">认可机构</th>
                            <th style="width: 280px;">符合标准</th>
                            <th>认证范围</th>
                        </tr>
                    </thead>
                    <tbody id="certTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 下半部分：归档材料清单 - 改为左右分栏 -->
        <div class="t-card material-card">
            <div class="t-card__header">
                <div>
                    <div style="font-size: 16px; font-weight: 600;">归档材料清单</div>
                    <div style="font-size: 12px; color: var(--text-placeholder); font-weight: normal; margin-top: 4px;">按审核阶段分类归档查阅</div>
                </div>
                <button class="t-button t-button--ghost" style="color: var(--warning-color); border-color: currentColor; height: 36px;" onclick="openDeficiencyModal()">
                    <i class="fas fa-plus"></i> 补充材料
                </button>
            </div>
            
            <!-- 左右分栏布局 -->
            <div class="material-layout" id="materialLayout">
                <!-- 左侧目录树 -->
                <div class="material-sidebar" id="materialSidebar">
                    <!-- 动态生成目录树 -->
                </div>
                
                <!-- 右侧文件列表 -->
                <div class="material-content" id="materialContent">
                    <!-- 动态生成文件列表 -->
                </div>
            </div>
        </div>
    </div>
</div>


<!-- 添加补充材料弹窗 -->
<div id="addMaterialModal" class="modal-overlay add-material-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin: 0; font-size: 16px; font-weight: 600;">添加补充材料</h3>
            <i class="t-icon t-icon-close" style="cursor: pointer; color: var(--text-placeholder); font-size: 20px;" onclick="closeAddMaterialModal()"></i>
        </div>
        <div class="modal-body">
            <div class="add-material-form">
                <div class="form-row">

<script>
// ================= 数据模型 =================
// 补充材料数据存储
const supplementaryMaterials = {
    'Q': {
        'general': {},
        'stage1': {},
        'stage2': {}
    },
    'E': {
        'general': {},
        'stage1': {},
        'stage2': {}
    },
    'S': {
        'general': {},
        'stage1': {},
        'stage2': {}
    },
    'IT': {
        'general': {},
        'stage1': {},
        'stage2': {}
    }
};

// 获取当前分类的补充材料
function getSupplementaryMaterials(domain, category, subcategory) {
    if (!supplementaryMaterials[domain]) return [];
    if (!supplementaryMaterials[domain][category]) return [];
    return supplementaryMaterials[domain][category][subcategory] || [];
}

// 添加补充材料
function addSupplementaryMaterial(domain, category, subcategory, material) {
    if (!supplementaryMaterials[domain][category]) {
        supplementaryMaterials[domain][category] = {};
    }
    if (!supplementaryMaterials[domain][category][subcategory]) {
        supplementaryMaterials[domain][category][subcategory] = [];
    }
    supplementaryMaterials[domain][category][subcategory].push({
        id: Date.now(),
        name: material.name,
        status: 'pending', // pending: 待补充, submitted: 已补充
        requirement: material.requirement || '',
        createTime: new Date().toLocaleString()
    });
}

// 更新补充材料状态
function updateSupplementaryStatus(domain, category, subcategory, materialId, status) {
    const materials = getSupplementaryMaterials(domain, category, subcategory);
    const material = materials.find(m => m.id === materialId);
    if (material) {
        material.status = status;
    }
}

const materials = {

// 当前任务配置
const taskConfig = {

};

let currentDomain = taskConfig.domainId;
let missingItemIndex = 1;

// 当前正在添加补充材料的分类信息
let currentAddMaterialCategory = null;
let currentAddMaterialSubcategory = null;

function renderContent() {
    const d = domains.find(x => x.id === currentDomain);
    
    document.getElementById('currentDomainDisplay').textContent = `${d.name}(${d.code})`;
    
    const statusTag = document.getElementById('domainStatusTag');

    const statusText = {
        'approved': '已通过',
        'rejected': '未通过',
        'pending': '待审核',
        'missing': '缺材料'
    };
    statusTag.textContent = statusText[d.status] || d.status;
    
    const headerActions = document.getElementById('headerActions');
    if (d.status === 'approved') {
        headerActions.innerHTML = `
            <div style="background: #e3f9e9; border: 1px solid #94d8af; padding: 8px 16px; border-radius: 4px; display: flex; align-items: center; gap: 8px; color: var(--success-color); font-weight: 600;">
                <i class="fas fa-check-circle"></i>
                本领域已通过认证
            </div>
        `;
    } else if (d.status === 'rejected') {
        headerActions.innerHTML = `
            <div style="background: #fff2f1; border: 1px solid #ffb6b1; padding: 8px 16px; border-radius: 4px; display: flex; align-items: center; gap: 8px; color: var(--danger-color); font-weight: 600;">

                本领域已驳回

            </button>

                <i class="fas fa-xmark"></i> 不予通过
            </button>
        `;
    }
    
    document.getElementById('certCount').textContent = d.count;
    
    // 渲染证书列表（保持不变）
    const certs = certificates[currentDomain] || [];
    const tbody = document.getElementById('certTableBody');

        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-placeholder); padding: 60px 0;">该领域暂无证书</td></tr>';
    } else {
        tbody.innerHTML = certs.map((c, idx) => {

// 渲染材料布局（左侧树 + 右侧内容）

        <div class="tree-container">
            <!-- 全部 -->
            <div class="tree-node-root">
                <div class="tree-node ${selectedTreeNode === 'all' || selectedTreeNode.startsWith('all-') ? 'active' : ''}" onclick="selectTreeNode('all')">
                    <i class="t-icon t-icon-folder-open tree-icon"></i>
                    <span>全部</span>
                </div>

                <!-- 第一层：通用材料 -->
                <div class="tree-children level-1">
                    <div class="tree-node-wrapper">
                        <div class="tree-node ${selectedTreeNode === 'general' || selectedTreeNode.startsWith('general-') ? 'active' : ''}" onclick="selectTreeNode('general')">
                            <i class="t-icon t-icon-chevron-right arrow expanded"></i>
                            <i class="t-icon t-icon-folder tree-icon"></i>
                            <span>通用材料</span>
                        </div>
                        <div class="tree-children level-2" style="display: block;">
                            ${mats.general.subcategories.map(sub => `

                                    <span>${sub.name}</span>

                        </div>
                    </div>

                    <!-- 第一层：第一阶段审核材料 -->
                    <div class="tree-node-wrapper">
                        <div class="tree-node ${selectedTreeNode === 'stage1' || selectedTreeNode.startsWith('stage1-') ? 'active' : ''}" onclick="selectTreeNode('stage1')">
                            <i class="t-icon t-icon-chevron-right arrow expanded"></i>
                            <i class="t-icon t-icon-folder tree-icon"></i>
                            <span>第一阶段审核材料</span>
                        </div>
                        <div class="tree-children level-2" style="display: block;">
                            ${mats.stage1.subcategories.map(sub => `
                                <div class="tree-node ${selectedTreeNode === 'stage1-' + sub.name ? 'active' : ''}" onclick="event.stopPropagation(); selectTreeNode('stage1-${sub.name}')">
                                    <i class="t-icon t-icon-file tree-icon"></i>
                                    <span>${sub.name}</span>
                                </div>
                            `).join('')}

                    </div>

                    <!-- 第一层：第二阶段审核后材料 -->
                    <div class="tree-node-wrapper">
                        <div class="tree-node ${selectedTreeNode === 'stage2' || selectedTreeNode.startsWith('stage2-') ? 'active' : ''}" onclick="selectTreeNode('stage2')">
                            <i class="t-icon t-icon-chevron-right arrow expanded"></i>
                            <i class="t-icon t-icon-folder tree-icon"></i>
                            <span>第二阶段审核后材料</span>
                        </div>
                        <div class="tree-children level-2" style="display: block;">
                            ${mats.stage2.subcategories.map(sub => `
                                <div class="tree-node ${selectedTreeNode === 'stage2-' + sub.name ? 'active' : ''}" onclick="event.stopPropagation(); selectTreeNode('stage2-${sub.name}')">
                                    <i class="t-icon t-icon-file tree-icon"></i>
                                    <span>${sub.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.getElementById('materialSidebar').innerHTML = sidebarHtml;

    // 右侧文件列表
    renderMaterialContent();
}

// 渲染右侧文件列表
function renderMaterialContent() {
    const mats = materials[currentDomain] || { stage1: { subcategories: [] }, stage2: { subcategories: [] }, general: { subcategories: [] } };
    let contentHtml = '';
    let title = '';
    
    // 根据选中节点确定显示内容
    if (selectedTreeNode === 'all') {
        title = '全部文件';
        // 显示所有分类下的所有文件
        const allCategories = [
            { key: 'general', label: '通用材料', data: mats.general },
            { key: 'stage1', label: '第一阶段审核材料', data: mats.stage1 },
            { key: 'stage2', label: '第二阶段审核后材料', data: mats.stage2 }
        ];
        
        allCategories.forEach(cat => {
            if (cat.data.subcategories && cat.data.subcategories.length > 0) {
                contentHtml += `<div class="subcategory-section">`;
                contentHtml += `<div class="subcategory-title"><i class="t-icon t-icon-folder"></i> ${cat.label}</div>`;
                cat.data.subcategories.forEach(sub => {
                    if (sub.files && sub.files.length > 0) {
                        contentHtml += renderFileList(sub.files);
                    }
                });
                contentHtml += `</div>`;
            }
        });
    } else if (selectedTreeNode === 'general' || selectedTreeNode === 'stage1' || selectedTreeNode === 'stage2') {
        const catKey = selectedTreeNode;
        const catData = mats[catKey];
        title = catData.label;
        
        if (catData.subcategories && catData.subcategories.length > 0) {
            catData.subcategories.forEach(sub => {
                if (sub.files && sub.files.length > 0) {
                    contentHtml += `<div class="subcategory-section">`;
                    contentHtml += `<div class="subcategory-title"><i class="t-icon t-icon-file"></i> ${sub.name}</div>`;
                    contentHtml += renderFileList(sub.files);
                    contentHtml += `</div>`;
                }
            });
        } else {
            contentHtml = '<div class="empty-tip">暂无材料</div>';
        }
    } else {
        // 选中了具体子分类
        const [catKey, subName] = selectedTreeNode.split('-');
        const catData = mats[catKey];
        const subData = catData.subcategories.find(s => s.name === subName);
        
        if (subData) {
            title = subData.name;
            if (subData.files && subData.files.length > 0) {
                contentHtml = renderFileList(subData.files);
            } else {
                contentHtml = '<div class="empty-tip">暂无文件</div>';
            }
        }
    }
    
    if (!contentHtml || contentHtml === '') {
        contentHtml = '<div class="empty-tip">暂无材料</div>';
    }
    
    document.getElementById('materialContent').innerHTML = `
        <div class="content-header">${title}</div>
        ${contentHtml}
    `;
}

// 渲染文件列表HTML
function renderFileList(files, type = 'original') {
    if (type === 'supplementary') {
        // 渲染补充材料
        return files.map(file => {
            let statusBadge = '';
            let itemClass = 'material-item';

            if (file.status === 'pending') {
                statusBadge = '<span class="supplementary-label pending"><i class="t-icon t-icon-time" style="font-size: 12px; margin-right: 4px;"></i>待补充</span>';
                itemClass += ' warning';
            } else if (file.status === 'submitted') {
                statusBadge = '<span class="supplementary-label submitted"><i class="t-icon t-icon-check" style="font-size: 12px; margin-right: 4px;"></i>补充材料</span>';
            }

            return `
                <div class="${itemClass}">
                    <div class="file-icon-wrapper supplementary">
                        <i class="t-icon t-icon-file-add"></i>
                    </div>
                    <div style="flex: 1; display: flex; align-items: center; flex-wrap: wrap;">
                        <span class="material-name" style="font-size: 14px; font-weight: 500;">${file.name}</span>
                        <span class="file-type-badge supplementary">补充</span>
                        ${statusBadge}
                        ${file.requirement ? `<div style="width: 100%; font-size: 12px; color: var(--text-placeholder); margin-top: 4px;">要求：${file.requirement}</div>` : ''}
                    </div>
                    <div class="preview-btn" onclick="viewSupplementaryMaterial(${file.id}, '${file.name}')">
                        <i class="t-icon t-icon-browse"></i> 预览
                    </div>
                </div>
            `;
        }).join('');
    } else {
        // 渲染原始材料
        return files.map(file => `
            <div class="material-item ${file.missing ? 'warning' : ''}">
                <div class="file-icon-wrapper ${file.type}">
                    <i class="t-icon ${file.type === 'pdf' ? 't-icon-file-pdf' : 't-icon-file-text'}"></i>
                </div>
                <div style="flex: 1; display: flex; align-items: center; flex-wrap: wrap;">
                    <span class="material-name" style="font-size: 14px; font-weight: 500;">${file.name}</span>
                    <span class="file-type-badge ${file.type}">
                        ${file.type === 'pdf' ? '附件' : '表单'}
                    </span>
                    ${file.missing ? '<span class="missing-label"><i class="t-icon t-icon-error-circle" style="font-size: 12px; margin-right: 4px;"></i>待补充</span>' : ''}
                </div>
                <div class="preview-btn" onclick="viewMaterial('${file.name}')">
                    <i class="t-icon t-icon-browse"></i> 预览
                </div>
            </div>
        `).join('');
    }
}

// 选择树节点
function selectTreeNode(nodeId) {
    selectedTreeNode = nodeId;
    renderMaterialLayout(); // 重新渲染以更新选中状态
}

function openDeficiencyModal() {
    document.getElementById('deficiencyModal').style.display = 'flex';
    document.getElementById('missingItemsContainer').innerHTML = createMissingItemHtml(0);
    missingItemIndex = 1;
}

function closeDeficiencyModal() {
    document.getElementById('deficiencyModal').style.display = 'none';
}

// 打开添加补充材料弹窗
function openAddMaterialModal(category, subcategory) {
    currentAddMaterialCategory = category;
    currentAddMaterialSubcategory = subcategory;

    const catNames = {
        'general': '通用材料',
        'stage1': '第一阶段审核材料',
        'stage2': '第二阶段审核后材料'
    };

    document.getElementById('currentCategoryDisplay').textContent = `${catNames[category]} > ${subcategory}`;
    document.getElementById('supplementaryMaterialName').value = '';
    document.getElementById('supplementaryMaterialRequirement').value = '';
    document.getElementById('addMaterialModal').style.display = 'flex';
}

// 关闭添加补充材料弹窗
function closeAddMaterialModal() {
    document.getElementById('addMaterialModal').style.display = 'none';
    currentAddMaterialCategory = null;
    currentAddMaterialSubcategory = null;
}

// 提交添加补充材料
function submitAddMaterial() {
    const name = document.getElementById('supplementaryMaterialName').value.trim();
    const requirement = document.getElementById('supplementaryMaterialRequirement').value.trim();

    if (!name) {
        alert('请输入材料名称');
        return;
    }

    // 添加到数据结构
    addSupplementaryMaterial(currentDomain, currentAddMaterialCategory, currentAddMaterialSubcategory, {
        name: name,
        requirement: requirement
    });

    closeAddMaterialModal();
    renderMaterialContent(); // 刷新右侧内容
    alert('补充材料已添加，状态为"待补充"');
}

// 预览补充材料
function viewSupplementaryMaterial(materialId, name) {
    // 这里可以实现查看补充材料详情的逻辑
    // 例如：查看要求、状态更新等
    const [catKey, subName] = selectedTreeNode.split('-');
    const materials = getSupplementaryMaterials(currentDomain, catKey || selectedTreeNode, subName || '');
    const material = materials.find(m => m.id === materialId);

    if (material) {
        const statusText = material.status === 'pending' ? '待补充' : '已提交';
        alert(`补充材料详情：\n名称：${material.name}\n状态：${statusText}\n要求：${material.requirement || '无'}\n创建时间：${material.createTime}`);
    }
}



function createMissingItemHtml(index) {
    return `
        <div class="missing-item-box">
            <div class="item-header">
                <span>缺失材料 #${index + 1}</span>
                ${index > 0 ? '<span class="delete-btn" onclick="this.parentElement.parentElement.remove()">删除</span>' : ''}
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <input type="text" class="t-input" placeholder="材料名称（如：营业执照副本）">
                <textarea class="t-textarea" placeholder="详细要求（如：需要彩色扫描件、分辨率300dpi以上）"></textarea>
            </div>
        </div>
    `;
}

function addMissingItem() {
    const container = document.getElementById('missingItemsContainer');
    const div = document.createElement('div');
    div.innerHTML = createMissingItemHtml(missingItemIndex);
    container.appendChild(div.firstElementChild);
    missingItemIndex++;
    document.querySelector('.modal-body').scrollTop = document.querySelector('.modal-body').scrollHeight;
}

function submitDeficiency() {
    const d = domains.find(x => x.id === currentDomain);
    d.status = 'missing';
    
    const stage1Data = materials[currentDomain].stage1;
    if (stage1Data.subcategories.length > 0) {
        stage1Data.subcategories[0].files.push(
            { name: '待补充材料.pdf', type: 'pdf', hasFile: false, missing: true }
        );
    }
    
    closeDeficiencyModal();
    renderContent();
    alert('缺失材料登记已提交，系统将通知企业补充。');
}

function approveDomain() {
    const d = domains.find(x => x.id === currentDomain);
    if (confirm(`确认通过 ${d.name} 领域下的全部 ${d.count} 张证书？`)) {
        d.status = 'approved';
        renderContent();
    }
}

function rejectDomain() {
    const reason = prompt('请填写不予通过的原因（必填）：');
    if (reason) {
        const d = domains.find(x => x.id === currentDomain);
        d.status = 'rejected';
        renderContent();
    }
}

function viewMaterial(name) {
    alert('预览材料：' + name);
}

init();
</script>

</body>
</html>
