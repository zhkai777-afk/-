<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择变更委员会团队及成员</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-container {
            width: 100%;
            max-width: 1200px;
            animation: modalSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .shuttle-box {
            height: 520px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .shuttle-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .team-item {
            transition: all 0.15s ease;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .team-item:hover {
            background-color: #f3f4f6;
        }

        .team-item.selected {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        .team-item.expanded {
            background-color: #f8fafc;
        }

        .member-item {
            transition: all 0.15s ease;
            border-radius: 6px;
            margin: 2px 0;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .member-item:hover {
            background-color: #f0f9ff;
        }

        .member-item.selected {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .checkbox-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            background: white;
        }

        .checkbox-wrapper input:checked ~ .checkmark {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .checkbox-wrapper input:checked ~ .checkmark::after {
            content: '';
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .checkbox-wrapper input:indeterminate ~ .checkmark {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .checkbox-wrapper input:indeterminate ~ .checkmark::after {
            content: '';
            width: 8px;
            height: 2px;
            background: white;
            transform: none;
            margin: 0;
        }

        .shuttle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d5db;
            background: white;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 8px 0;
        }

        .shuttle-btn:hover:not(:disabled) {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .shuttle-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #f3f4f6;
        }

        .tag {
            animation: tagIn 0.2s ease;
        }

        @keyframes tagIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #9ca3af;
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- 弹窗内容（直接显示，无遮罩层） -->
    <div class="modal-container">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
            
            <!-- 头部 -->
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-gray-50 to-white">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">选择变更委员会团队及成员</h2>
                    <p class="text-sm text-gray-500 mt-1">从左侧选择团队或成员，添加到右侧审批列表</p>
                </div>
                <div class="text-sm text-gray-400 bg-gray-100 px-3 py-1 rounded-full">
                    变更委员会信息管理
                </div>
            </div>

            <!-- 穿梭框主体 -->
            <div class="p-8 flex gap-6 flex-1">
                
                <!-- 左侧：待选择 -->
                <div class="flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <h3 class="font-semibold text-gray-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                            可选团队及成员
                            <span id="leftCount" class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">0</span>
                        </h3>
                        <div class="flex gap-2">
                            <button onclick="expandAllTeams()" class="text-xs text-blue-600 hover:text-blue-700 font-medium">全部展开</button>
                            <span class="text-gray-300">|</span>
                            <button onclick="collapseAllTeams()" class="text-xs text-blue-600 hover:text-blue-700 font-medium">全部收起</button>
                        </div>
                    </div>
                    
                    <div class="shuttle-box">
                        <!-- 搜索 -->
                        <div class="p-3 border-b border-gray-100">
                            <div class="relative">
                                <input type="text" id="leftSearch" placeholder="搜索团队或成员..." 
                                    class="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm search-input transition-all"
                                    oninput="filterLeft()">
                                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                        </div>
                        
                        <!-- 列表 -->
                        <div id="leftList" class="list-container custom-scrollbar">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>

                <!-- 中间：操作按钮 -->
                <div class="flex flex-col justify-center items-center px-2">
                    <button onclick="addSelected()" id="btnAdd" class="shuttle-btn" disabled title="添加选中项">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                    
                    <button onclick="addAll()" class="shuttle-btn" title="添加全部">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
                        </svg>
                    </button>

                    <div class="h-8"></div>

                    <button onclick="removeSelected()" id="btnRemove" class="shuttle-btn" disabled title="移除选中项">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>

                    <button onclick="removeAll()" class="shuttle-btn" title="移除全部">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
                        </svg>
                    </button>
                </div>

                <!-- 右侧：已选择 -->
                <div class="flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <h3 class="font-semibold text-gray-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                            已选审批成员
                            <span id="rightCount" class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">0</span>
                        </h3>
                        <button onclick="removeAll()" class="text-xs text-red-500 hover:text-red-600 font-medium">清空</button>
                    </div>
                    
                    <div class="shuttle-box border-green-200">
                        <!-- 搜索 -->
                        <div class="p-3 border-b border-gray-100 bg-green-50/30">
                            <div class="relative">
                                <input type="text" id="rightSearch" placeholder="搜索已选成员..." 
                                    class="w-full pl-9 pr-3 py-2 bg-white border border-gray-200 rounded-lg text-sm search-input transition-all"
                                    oninput="filterRight()">
                                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                        </div>
                        
                        <!-- 列表 -->
                        <div id="rightList" class="list-container custom-scrollbar bg-green-50/10">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部 -->
            <div class="px-8 py-5 border-t border-gray-100 bg-gray-50 flex justify-between items-center">
                <div class="text-sm text-gray-600">
                    已选 <span id="totalTeams" class="font-semibold text-gray-800">0</span> 个团队， 
                    <span id="totalMembers" class="font-semibold text-gray-800">0</span> 名成员
                </div>
                <div class="flex gap-3">
                    <button onclick="cancelSelection()" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-white hover:shadow-sm transition-all">
                        取消
                    </button>
                    <button onclick="confirmSelection()" class="px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                        确认选择
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const sourceData = [
            {
                id: 't1',
                name: 'AE-Chain&AE-VCT',
                createTime: '2025-08-25',
                expanded: true,
                members: [
                    { id: 'm1', name: 'Kevin HU', role: 'CQE', email: 'kevin.hu@example.com', avatar: 'KH' },
                    { id: 'm2', name: 'Alice Chen', role: 'PM', email: 'alice.chen@example.com', avatar: 'AC' },
                    { id: 'm3', name: 'Bob Wang', role: 'DEV', email: 'bob.wang@example.com', avatar: 'BW' }
                ]
            },
            {
                id: 't2',
                name: 'L&L',
                createTime: '2025-08-25',
                expanded: false,
                members: [
                    { id: 'm4', name: 'Clark Wang', role: 'CQE', email: 'clark.wang@example.com', avatar: 'CW' }
                ]
            },
            {
                id: 't3',
                name: 'ME',
                createTime: '2025-08-25',
                expanded: false,
                members: [
                    { id: 'm5', name: 'David Li', role: 'ENG', email: 'david.li@example.com', avatar: 'DL' },
                    { id: 'm6', name: 'Emma Zhang', role: 'QA', email: 'emma.zhang@example.com', avatar: 'EZ' },
                    { id: 'm7', name: 'Frank Liu', role: 'MFG', email: 'frank.liu@example.com', avatar: 'FL' }
                ]
            },
            {
                id: 't4',
                name: 'PM',
                createTime: '2025-08-25',
                expanded: false,
                members: [
                    { id: 'm8', name: 'Grace Wu', role: 'PMO', email: 'grace.wu@example.com', avatar: 'GW' }
                ]
            },
            {
                id: 't5',
                name: 'Operation',
                createTime: '2025-08-25',
                expanded: false,
                members: [
                    { id: 'm9', name: 'Henry Zhao', role: 'OP', email: 'henry.zhao@example.com', avatar: 'HZ' },
                    { id: 'm10', name: 'Ivy Yang', role: 'OP', email: 'ivy.yang@example.com', avatar: 'IY' },
                    { id: 'm11', name: 'Jack Ma', role: 'OP', email: 'jack.ma@example.com', avatar: 'JM' }
                ]
            },
            {
                id: 't6',
                name: 'QA',
                createTime: '2025-08-25',
                expanded: false,
                members: [
                    { id: 'm12', name: 'Kelly Sun', role: 'QA Lead', email: 'kelly.sun@example.com', avatar: 'KS' }
                ]
            }
        ];

        let leftSelected = new Set(); // 左侧选中的成员ID
        let rightSelected = new Set(); // 右侧选中的成员ID
        let rightData = []; // 右侧已选数据 {teamId, memberId, teamName, member}

        function init() {
            renderLeft();
            renderRight();
            updateStats();
        }

        function renderLeft() {
            const container = document.getElementById('leftList');
            const searchTerm = document.getElementById('leftSearch').value.toLowerCase();
            container.innerHTML = '';

            sourceData.forEach(team => {
                // 检查是否全部成员已在右侧
                const allInRight = team.members.every(m => rightData.some(r => r.memberId === m.id));
                
                // 过滤搜索
                const teamMatch = team.name.toLowerCase().includes(searchTerm);
                const filteredMembers = team.members.filter(m => 
                    m.name.toLowerCase().includes(searchTerm) || 
                    m.role.toLowerCase().includes(searchTerm)
                );

                if (!teamMatch && filteredMembers.length === 0 && searchTerm) return;

                const teamDiv = document.createElement('div');
                teamDiv.className = `team-item ${team.expanded ? 'expanded' : ''}`;
                
                // 团队头部
                const header = document.createElement('div');
                header.className = 'flex items-center gap-2 p-3 cursor-pointer select-none';
                header.onclick = (e) => {
                    if (!e.target.closest('input')) {
                        toggleTeamExpand(team.id);
                    }
                };

                // 检查团队选中状态
                const availableMembers = team.members.filter(m => !rightData.some(r => r.memberId === m.id));
                const teamChecked = availableMembers.length > 0 && availableMembers.every(m => leftSelected.has(m.id));
                const teamIndeterminate = availableMembers.some(m => leftSelected.has(m.id)) && !teamChecked;

                header.innerHTML = `
                    <svg class="w-4 h-4 text-gray-400 transform transition-transform ${team.expanded ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                    <div class="checkbox-wrapper" onclick="event.stopPropagation()">
                        <input type="checkbox" 
                            ${teamChecked ? 'checked' : ''} 
                            ${availableMembers.length === 0 ? 'disabled' : ''}
                            onchange="toggleTeam('${team.id}')"
                            id="team-${team.id}">
                        <div class="checkmark"></div>
                    </div>
                    <div class="flex-1 flex items-center justify-between">
                        <span class="font-semibold text-gray-800 flex items-center gap-2 ${availableMembers.length === 0 ? 'text-gray-400' : ''}">
                            <svg class="w-4 h-4 ${availableMembers.length === 0 ? 'text-gray-300' : 'text-blue-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            ${team.name}
                        </span>
                        <span class="text-xs ${availableMembers.length === 0 ? 'text-gray-300' : 'text-gray-400'}">${availableMembers.length}/${team.members.length}</span>
                    </div>
                `;

                // 处理半选状态
                const checkbox = header.querySelector('input');
                if (teamIndeterminate) {
                    checkbox.indeterminate = true;
                }

                teamDiv.appendChild(header);

                // 成员列表
                if (team.expanded) {
                    const membersDiv = document.createElement('div');
                    membersDiv.className = 'pl-9 pr-2 pb-2';
                    
                    const displayMembers = searchTerm && !teamMatch ? filteredMembers : team.members;
                    
                    displayMembers.forEach(member => {
                        const isInRight = rightData.some(r => r.memberId === member.id);
                        const isSelected = leftSelected.has(member.id);
                        
                        const memberDiv = document.createElement('div');
                        memberDiv.className = `member-item ${isSelected ? 'selected' : ''} ${isInRight ? 'opacity-40 cursor-not-allowed' : ''}`;
                        
                        if (!isInRight) {
                            memberDiv.onclick = (e) => {
                                if (!e.target.closest('input')) {
                                    toggleMember(member.id);
                                }
                            };
                        }

                        memberDiv.innerHTML = `
                            <div class="checkbox-wrapper" onclick="event.stopPropagation()">
                                <input type="checkbox" 
                                    ${isSelected ? 'checked' : ''} 
                                    ${isInRight ? 'disabled' : ''}
                                    onchange="toggleMember('${member.id}')">
                                <div class="checkmark"></div>
                            </div>
                            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 text-white flex items-center justify-center text-xs font-bold shadow-sm">
                                ${member.avatar}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-medium text-gray-800 flex items-center gap-2">
                                    ${member.name}
                                    <span class="text-xs text-gray-500 font-normal">${member.role}</span>
                                </div>
                                <div class="text-xs text-gray-500 truncate">${member.email}</div>
                            </div>
                            ${isInRight ? '<span class="text-xs text-green-600 font-medium">已选</span>' : ''}
                        `;
                        membersDiv.appendChild(memberDiv);
                    });
                    
                    teamDiv.appendChild(membersDiv);
                }

                container.appendChild(teamDiv);
            });

            updateLeftCount();
            updateButtons();
        }

        function renderRight() {
            const container = document.getElementById('rightList');
            const searchTerm = document.getElementById('rightSearch').value.toLowerCase();
            container.innerHTML = '';

            if (rightData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="w-16 h-16 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <p class="text-sm">暂无选择的成员</p>
                        <p class="text-xs mt-1">请从左侧选择团队或成员</p>
                    </div>
                `;
                updateRightCount();
                updateButtons();
                return;
            }

            // 按团队分组显示
            const grouped = {};
            rightData.forEach(item => {
                if (!grouped[item.teamId]) {
                    grouped[item.teamId] = {
                        teamName: item.teamName,
                        members: []
                    };
                }
                grouped[item.teamId].members.push(item);
            });

            Object.entries(grouped).forEach(([teamId, team]) => {
                if (searchTerm && !team.teamName.toLowerCase().includes(searchTerm) && 
                    !team.members.some(m => m.member.name.toLowerCase().includes(searchTerm))) return;

                const teamDiv = document.createElement('div');
                teamDiv.className = 'mb-4 tag';
                
                const header = document.createElement('div');
                header.className = 'flex items-center gap-2 px-3 py-2 bg-blue-50 rounded-t-lg border border-blue-100 border-b-0';
                header.innerHTML = `
                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <span class="font-semibold text-blue-900 text-sm">${team.teamName}</span>
                    <span class="text-xs text-blue-600 ml-auto">${team.members.length}人</span>
                `;
                teamDiv.appendChild(header);

                const membersDiv = document.createElement('div');
                membersDiv.className = 'border border-blue-100 rounded-b-lg overflow-hidden';
                
                team.members.forEach(item => {
                    if (searchTerm && !item.member.name.toLowerCase().includes(searchTerm) && 
                        !item.member.role.toLowerCase().includes(searchTerm)) return;

                    const isSelected = rightSelected.has(item.memberId);
                    
                    const memberDiv = document.createElement('div');
                    memberDiv.className = `flex items-center gap-3 p-3 hover:bg-blue-50/50 cursor-pointer transition-colors ${isSelected ? 'bg-blue-50' : 'bg-white'}`;
                    memberDiv.onclick = (e) => {
                        if (!e.target.closest('button')) {
                            toggleRightSelection(item.memberId);
                        }
                    };

                    memberDiv.innerHTML = `
                        <div class="checkbox-wrapper">
                            <input type="checkbox" 
                                ${isSelected ? 'checked' : ''} 
                                onchange="toggleRightSelection('${item.memberId}')">
                            <div class="checkmark"></div>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-green-400 to-green-600 text-white flex items-center justify-center text-xs font-bold shadow-sm">
                            ${item.member.avatar}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium text-gray-800">${item.member.name}</div>
                            <div class="text-xs text-gray-500">${item.member.role} · ${item.member.email}</div>
                        </div>
                        <button onclick="removeMember('${item.memberId}')" class="w-7 h-7 rounded-full hover:bg-red-100 text-gray-400 hover:text-red-500 flex items-center justify-center transition-colors" title="移除">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    `;
                    membersDiv.appendChild(memberDiv);
                });
                
                teamDiv.appendChild(membersDiv);
                container.appendChild(teamDiv);
            });

            updateRightCount();
            updateButtons();
        }

        function toggleTeamExpand(teamId) {
            const team = sourceData.find(t => t.id === teamId);
            if (team) {
                team.expanded = !team.expanded;
                renderLeft();
            }
        }

        function toggleTeam(teamId) {
            const team = sourceData.find(t => t.id === teamId);
            const availableMembers = team.members.filter(m => !rightData.some(r => r.memberId === m.id));
            const allSelected = availableMembers.every(m => leftSelected.has(m.id));
            
            if (allSelected) {
                // 取消全选
                availableMembers.forEach(m => leftSelected.delete(m.id));
            } else {
                // 全选
                availableMembers.forEach(m => leftSelected.add(m.id));
            }
            renderLeft();
        }

        function toggleMember(memberId) {
            if (leftSelected.has(memberId)) {
                leftSelected.delete(memberId);
            } else {
                leftSelected.add(memberId);
            }
            renderLeft();
        }

        function toggleRightSelection(memberId) {
            if (rightSelected.has(memberId)) {
                rightSelected.delete(memberId);
            } else {
                rightSelected.add(memberId);
            }
            renderRight();
        }

        function addSelected() {
            if (leftSelected.size === 0) return;
            
            leftSelected.forEach(memberId => {
                // 找到该成员所属团队
                for (let team of sourceData) {
                    const member = team.members.find(m => m.id === memberId);
                    if (member && !rightData.some(r => r.memberId === memberId)) {
                        rightData.push({
                            teamId: team.id,
                            memberId: member.id,
                            teamName: team.name,
                            member: member
                        });
                    }
                }
            });
            
            leftSelected.clear();
            renderLeft();
            renderRight();
            updateStats();
        }

        function addAll() {
            sourceData.forEach(team => {
                team.members.forEach(member => {
                    if (!rightData.some(r => r.memberId === member.id)) {
                        rightData.push({
                            teamId: team.id,
                            memberId: member.id,
                            teamName: team.name,
                            member: member
                        });
                    }
                });
            });
            leftSelected.clear();
            renderLeft();
            renderRight();
            updateStats();
        }

        function removeSelected() {
            if (rightSelected.size === 0) return;
            
            rightData = rightData.filter(item => !rightSelected.has(item.memberId));
            rightSelected.clear();
            renderRight();
            updateStats();
        }

        function removeMember(memberId) {
            rightData = rightData.filter(item => item.memberId !== memberId);
            rightSelected.delete(memberId);
            renderRight();
            updateStats();
        }

        function removeAll() {
            rightData = [];
            rightSelected.clear();
            renderRight();
            updateStats();
        }

        function updateButtons() {
            document.getElementById('btnAdd').disabled = leftSelected.size === 0;
            document.getElementById('btnRemove').disabled = rightSelected.size === 0;
        }

        function updateLeftCount() {
            const available = sourceData.reduce((sum, t) => sum + t.members.filter(m => !rightData.some(r => r.memberId === m.id)).length, 0);
            document.getElementById('leftCount').textContent = available;
        }

        function updateRightCount() {
            document.getElementById('rightCount').textContent = rightData.length;
        }

        function updateStats() {
            const teams = new Set(rightData.map(r => r.teamId)).size;
            document.getElementById('totalTeams').textContent = teams;
            document.getElementById('totalMembers').textContent = rightData.length;
        }

        function filterLeft() {
            renderLeft();
        }

        function filterRight() {
            renderRight();
        }

        function expandAllTeams() {
            sourceData.forEach(t => t.expanded = true);
            renderLeft();
        }

        function collapseAllTeams() {
            sourceData.forEach(t => t.expanded = false);
            renderLeft();
        }

        function confirmSelection() {
            if (rightData.length === 0) {
                alert('请至少选择一名成员');
                return;
            }
            
            console.log('已选择：', rightData);
            alert(`成功选择 ${rightData.length} 名成员，来自 ${new Set(rightData.map(r => r.teamId)).size} 个团队`);
        }

        function cancelSelection() {
            if (confirm('确定要取消选择吗？所有已选数据将被清空。')) {
                removeAll();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
