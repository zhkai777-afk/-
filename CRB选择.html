<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择变更委员会团队及成员 - TDesign</title>
    <style>
        /* TDesign Variables & Reset */
        :root {
            /* TDesign Brand Colors */
            --td-brand-color: #0052D9;
            --td-brand-color-hover: #1890FF;
            --td-brand-color-active: #003CAB;
            --td-brand-color-light: #E8F3FF;
            --td-brand-color-light-hover: #F2F8FF;
            
            /* TDesign Functional Colors */
            --td-success-color: #00A870;
            --td-success-color-light: #E8F8F2;
            --td-warning-color: #ED7B2F;
            --td-error-color: #E34D59;
            --td-error-color-light: #FDECEE;
            
            /* TDesign Gray Scale */
            --td-gray-1: #F5F5F5;
            --td-gray-2: #EEEEEE;
            --td-gray-3: #E7E7E7;
            --td-gray-4: #DCDCDC;
            --td-gray-5: #C5C5C5;
            --td-gray-6: #A6A6A6;
            --td-gray-7: #8B8B8B;
            --td-gray-8: #777777;
            --td-gray-9: #5E5E5E;
            --td-gray-10: #4B4B4B;
            --td-gray-11: #383838;
            --td-gray-12: #2C2C2C;
            --td-gray-13: #242424;
            --td-gray-14: #181818;
            
            /* TDesign Shadows */
            --td-shadow-1: 0 1px 2px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.03);
            --td-shadow-2: 0 2px 4px rgba(0, 0, 0, 0.04), 0 4px 8px rgba(0, 0, 0, 0.04);
            --td-shadow-3: 0 4px 8px rgba(0, 0, 0, 0.06), 0 8px 16px rgba(0, 0, 0, 0.06);
            
            /* TDesign Radius */
            --td-radius-small: 3px;
            --td-radius-medium: 6px;
            --td-radius-large: 9px;
            --td-radius-extra-large: 12px;
            
            /* TDesign Font */
            --td-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: var(--td-font-family);
            width: 100vw;
            height: 100vh;
            margin: 0;
            background-color: var(--td-gray-1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--td-gray-12);
            line-height: 1.5;
        }

        /* TDesign Button Styles */
        .td-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: var(--td-radius-small);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.38, 0, 0.24, 1);
            font-size: 14px;
            line-height: 22px;
            padding: 5px 16px;
            height: 32px;
            white-space: nowrap;
            outline: none;
            font-weight: 400;
        }

        .td-button-primary {
            background-color: var(--td-brand-color);
            color: #fff;
            border-color: var(--td-brand-color);
        }

        .td-button-primary:hover {
            background-color: var(--td-brand-color-hover);
            border-color: var(--td-brand-color-hover);
        }

        .td-button-primary:active {
            background-color: var(--td-brand-color-active);
            border-color: var(--td-brand-color-active);
        }

        .td-button-default {
            background-color: #fff;
            color: var(--td-gray-12);
            border-color: var(--td-gray-4);
        }

        .td-button-default:hover {
            border-color: var(--td-brand-color);
            color: var(--td-brand-color);
        }

        .td-button-default:active {
            border-color: var(--td-brand-color-active);
            color: var(--td-brand-color-active);
        }

        .td-button-danger {
            color: var(--td-error-color);
            background-color: transparent;
            border-color: transparent;
        }

        .td-button-danger:hover {
            background-color: var(--td-error-color-light);
        }

        .td-button-text {
            color: var(--td-brand-color);
            background: transparent;
            border: none;
            padding: 5px 8px;
            height: auto;
        }

        .td-button-text:hover {
            background-color: var(--td-brand-color-light-hover);
        }

        /* TDesign Input */
        .td-input {
            width: 100%;
            height: 32px;
            padding: 5px 12px;
            border: 1px solid var(--td-gray-4);
            border-radius: var(--td-radius-small);
            font-size: 14px;
            line-height: 22px;
            color: var(--td-gray-12);
            transition: all 0.2s;
            outline: none;
            background-color: #fff;
        }

        .td-input:hover {
            border-color: var(--td-brand-color);
        }

        .td-input:focus {
            border-color: var(--td-brand-color);
            box-shadow: 0 0 0 2px var(--td-brand-color-light);
        }

        .td-input::placeholder {
            color: var(--td-gray-6);
        }

        /* TDesign Checkbox */
        .td-checkbox {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .td-checkbox input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .td-checkbox-inner {
            width: 16px;
            height: 16px;
            border: 1px solid var(--td-gray-5);
            border-radius: var(--td-radius-small);
            background-color: #fff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .td-checkbox input:checked + .td-checkbox-inner {
            background-color: var(--td-brand-color);
            border-color: var(--td-brand-color);
        }

        .td-checkbox input:checked + .td-checkbox-inner::after {
            content: '';
            width: 4px;
            height: 8px;
            border: solid #fff;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg) translateY(-1px);
        }

        .td-checkbox input:indeterminate + .td-checkbox-inner {
            background-color: var(--td-brand-color);
            border-color: var(--td-brand-color);
        }

        .td-checkbox input:indeterminate + .td-checkbox-inner::after {
            content: '';
            width: 8px;
            height: 1.5px;
            background: #fff;
            transform: none;
        }

        .td-checkbox input:disabled + .td-checkbox-inner {
            background-color: var(--td-gray-2);
            border-color: var(--td-gray-4);
            cursor: not-allowed;
        }

        /* TDesign Tag */
        .td-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 8px;
            height: 24px;
            font-size: 12px;
            line-height: 22px;
            border-radius: var(--td-radius-small);
            background-color: var(--td-gray-2);
            color: var(--td-gray-10);
            border: 1px solid transparent;
        }

        .td-tag-primary {
            background-color: var(--td-brand-color-light);
            color: var(--td-brand-color);
        }

        .td-tag-success {
            background-color: var(--td-success-color-light);
            color: var(--td-success-color);
        }

        /* Layout Structure */
        .modal-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-content {
            width: 90%;
            max-width: 1200px;
            height: 90%;
            max-height: 800px;
            background: #fff;
            border-radius: var(--td-radius-extra-large);
            box-shadow: var(--td-shadow-3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header */
        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--td-gray-3);
            background: linear-gradient(to right, #fff, var(--td-gray-1));
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--td-gray-13);
            line-height: 1.4;
            margin: 0;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--td-gray-7);
            margin: 4px 0 0 0;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            padding: 24px 32px;
            gap: 24px;
            overflow: hidden;
            min-height: 0;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            height: 32px;
        }

        .panel-title {
            font-weight: 600;
            color: var(--td-gray-12);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .panel-title-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--td-brand-color);
        }

        .panel-title-dot.success {
            background: var(--td-success-color);
        }

        /* Shuttle Box */
        .shuttle-box {
            height: 100%;
            border: 1px solid var(--td-gray-3);
            border-radius: var(--td-radius-medium);
            background: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s;
        }

        .shuttle-box:hover {
            border-color: var(--td-gray-4);
        }

        .shuttle-box.success {
            border-color: rgba(0, 168, 112, 0.3);
            background: linear-gradient(to bottom, #fff, rgba(0, 168, 112, 0.02));
        }

        .search-wrapper {
            padding: 12px 16px;
            border-bottom: 1px solid var(--td-gray-2);
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--td-gray-6);
            pointer-events: none;
            z-index: 1;
        }

        .search-input-wrapper {
            position: relative;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        /* Custom Scrollbar - TDesign Style */
        .td-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .td-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .td-scrollbar::-webkit-scrollbar-thumb {
            background: var(--td-gray-4);
            border-radius: 3px;
        }

        .td-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--td-gray-5);
        }

        /* Actions Center */
        .actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .shuttle-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--td-radius-small);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--td-gray-4);
            background: #fff;
            color: var(--td-gray-8);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
        }

        .shuttle-btn:hover:not(:disabled) {
            border-color: var(--td-brand-color);
            color: var(--td-brand-color);
            background: var(--td-brand-color-light-hover);
        }

        .shuttle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--td-gray-1);
        }

        /* Team & Member Items */
        .team-item {
            transition: all 0.2s;
            border-radius: var(--td-radius-small);
            margin-bottom: 4px;
        }

        .team-item:hover {
            background-color: var(--td-gray-1);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            user-select: none;
        }

        .team-arrow {
            width: 16px;
            height: 16px;
            color: var(--td-gray-6);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .team-arrow.expanded {
            transform: rotate(90deg);
        }

        .team-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--td-gray-13);
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .team-icon {
            width: 16px;
            height: 16px;
            color: var(--td-brand-color);
            flex-shrink: 0;
        }

        .team-count {
            font-size: 12px;
            color: var(--td-gray-6);
            flex-shrink: 0;
        }

        .member-list {
            padding: 0 12px 8px 44px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: var(--td-radius-small);
            cursor: pointer;
            transition: all 0.2s;
            margin: 2px 0;
        }

        .member-item:hover:not(.disabled) {
            background-color: var(--td-brand-color-light-hover);
        }

        .member-item.selected {
            background-color: var(--td-brand-color-light);
        }

        .member-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .member-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--td-brand-color-hover), var(--td-brand-color));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .member-avatar.success {
            background: linear-gradient(135deg, var(--td-success-color), #008F5D);
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--td-gray-13);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .member-role {
            font-size: 11px;
            color: var(--td-gray-7);
            font-weight: 400;
        }

        .member-email {
            font-size: 11px;
            color: var(--td-gray-6);
            margin-top: 1px;
        }

        .member-status {
            font-size: 11px;
            color: var(--td-success-color);
            font-weight: 500;
            flex-shrink: 0;
        }

        /* Right Panel Selected Items */
        .selected-group {
            margin-bottom: 12px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .selected-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--td-brand-color-light);
            border-radius: var(--td-radius-small) var(--td-radius-small) 0 0;
            border: 1px solid rgba(0, 82, 217, 0.15);
            border-bottom: none;
        }

        .selected-group-title {
            font-weight: 600;
            font-size: 13px;
            color: var(--td-brand-color);
            flex: 1;
        }

        .selected-group-count {
            font-size: 11px;
            color: var(--td-brand-color);
            opacity: 0.8;
        }

        .selected-members {
            border: 1px solid rgba(0, 82, 217, 0.15);
            border-radius: 0 0 var(--td-radius-small) var(--td-radius-small);
            overflow: hidden;
            background: #fff;
        }

        .selected-member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--td-gray-2);
        }

        .selected-member-item:last-child {
            border-bottom: none;
        }

        .selected-member-item:hover {
            background: var(--td-brand-color-light-hover);
        }

        .selected-member-item.active {
            background: var(--td-brand-color-light);
        }

        .remove-btn {
            width: 24px;
            height: 24px;
            border-radius: var(--td-radius-small);
            border: none;
            background: transparent;
            color: var(--td-gray-5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .remove-btn:hover {
            background: var(--td-error-color-light);
            color: var(--td-error-color);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--td-gray-6);
            text-align: center;
            padding: 24px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            color: var(--td-gray-4);
            margin-bottom: 12px;
        }

        .empty-title {
            font-size: 14px;
            color: var(--td-gray-8);
            margin-bottom: 4px;
        }

        .empty-desc {
            font-size: 12px;
            color: var(--td-gray-6);
        }

        /* Footer */
        .footer {
            padding: 16px 32px;
            border-top: 1px solid var(--td-gray-3);
            background: var(--td-gray-1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .footer-info {
            font-size: 14px;
            color: var(--td-gray-8);
        }

        .footer-info strong {
            color: var(--td-gray-13);
            font-weight: 600;
        }

        .footer-actions {
            display: flex;
            gap: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                height: 95%;
            }
            
            .main-content {
                flex-direction: column;
                padding: 16px;
            }
            
            .actions {
                flex-direction: row;
                justify-content: center;
                padding: 8px 0;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 14px;
            }
            
            .header {
                padding: 16px;
            }
            
            .header-title {
                font-size: 16px;
            }
        }

        /* Utility */
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
<base target="_blank">

<body>

    <div class="modal-container">
        <div class="modal-content">
            <!-- Header -->
            <div class="header">
                <div>
                    <h1 class="header-title">选择变更委员会团队及成员</h1>
                    <p class="header-subtitle">从左侧选择团队或成员，添加到右侧审批列表</p>
                </div>
                <span class="td-tag">变更委员会信息管理</span>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <span class="panel-title-dot"></span>
                            可选团队及成员
                            <span id="leftCount" class="td-tag">0</span>
                        </div>
                        <div>
                            <button class="td-button td-button-text" onclick="expandAllTeams()">全部展开</button>
                            <span style="color: var(--td-gray-4); margin: 0 4px;">|</span>
                            <button class="td-button td-button-text" onclick="collapseAllTeams()">全部收起</button>
                        </div>
                    </div>
                    
                    <div class="shuttle-box">
                        <div class="search-wrapper">
                            <div class="search-input-wrapper">
                                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                                <input type="text" id="leftSearch" class="td-input" style="padding-left: 36px;" placeholder="搜索团队或成员..." oninput="filterLeft()">
                            </div>
                        </div>
                        <div id="leftList" class="list-container td-scrollbar"></div>
                    </div>
                </div>

                <!-- Center Actions -->
                <div class="actions">
                    <button onclick="addSelected()" id="btnAdd" class="shuttle-btn" disabled title="添加选中项">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m9 18 6-6-6-6"/>
                        </svg>
                    </button>
                    
                    <button onclick="addAll()" class="shuttle-btn" title="添加全部">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m13 18 6-6-6-6M5 18l6-6-6-6"/>
                        </svg>
                    </button>

                    <div style="height: 16px;"></div>

                    <button onclick="removeSelected()" id="btnRemove" class="shuttle-btn" disabled title="移除选中项">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m15 18-6-6 6-6"/>
                        </svg>
                    </button>

                    <button onclick="removeAll()" class="shuttle-btn" title="移除全部">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m11 18-6-6 6-6M17 18l-6-6 6-6"/>
                        </svg>
                    </button>
                </div>

                <!-- Right Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <span class="panel-title-dot success"></span>
                            已选审批成员
                            <span id="rightCount" class="td-tag td-tag-success">0</span>
                        </div>
                        <button class="td-button td-button-danger" onclick="removeAll()">清空</button>
                    </div>
                    
                    <div class="shuttle-box success">
                        <div class="search-wrapper" style="background: rgba(0, 168, 112, 0.04);">
                            <div class="search-input-wrapper">
                                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                                <input type="text" id="rightSearch" class="td-input" style="padding-left: 36px;" placeholder="搜索已选成员..." oninput="filterRight()">
                            </div>
                        </div>
                        <div id="rightList" class="list-container td-scrollbar" style="background: rgba(0, 168, 112, 0.02);"></div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="footer-info">
                    已选 <strong id="totalTeams">0</strong> 个团队，<strong id="totalMembers">0</strong> 名成员
                </div>
                <div class="footer-actions">
                    <button class="td-button td-button-default" onclick="cancelSelection()">取消</button>
                    <button class="td-button td-button-primary" onclick="confirmSelection()">确认选择</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Structure
        const sourceData = [
            {
                id: 't1',
                name: 'AE-Chain&AE-VCT',
                expanded: true,
                members: [
                    { id: 'm1', name: 'Kevin HU', role: 'CQE', email: 'kevin.hu@example.com', avatar: 'KH' },
                    { id: 'm2', name: 'Alice Chen', role: 'PM', email: 'alice.chen@example.com', avatar: 'AC' },
                    { id: 'm3', name: 'Bob Wang', role: 'DEV', email: 'bob.wang@example.com', avatar: 'BW' }
                ]
            },
            {
                id: 't2',
                name: 'L&L',
                expanded: false,
                members: [
                    { id: 'm4', name: 'Clark Wang', role: 'CQE', email: 'clark.wang@example.com', avatar: 'CW' }
                ]
            },
            {
                id: 't3',
                name: 'ME',
                expanded: false,
                members: [
                    { id: 'm5', name: 'David Li', role: 'ENG', email: 'david.li@example.com', avatar: 'DL' },
                    { id: 'm6', name: 'Emma Zhang', role: 'QA', email: 'emma.zhang@example.com', avatar: 'EZ' },
                    { id: 'm7', name: 'Frank Liu', role: 'MFG', email: 'frank.liu@example.com', avatar: 'FL' }
                ]
            },
            {
                id: 't4',
                name: 'PM',
                expanded: false,
                members: [
                    { id: 'm8', name: 'Grace Wu', role: 'PMO', email: 'grace.wu@example.com', avatar: 'GW' }
                ]
            },
            {
                id: 't5',
                name: 'Operation',
                expanded: false,
                members: [
                    { id: 'm9', name: 'Henry Zhao', role: 'OP', email: 'henry.zhao@example.com', avatar: 'HZ' },
                    { id: 'm10', name: 'Ivy Yang', role: 'OP', email: 'ivy.yang@example.com', avatar: 'IY' },
                    { id: 'm11', name: 'Jack Ma', role: 'OP', email: 'jack.ma@example.com', avatar: 'JM' }
                ]
            },
            {
                id: 't6',
                name: 'QA',
                expanded: false,
                members: [
                    { id: 'm12', name: 'Kelly Sun', role: 'QA Lead', email: 'kelly.sun@example.com', avatar: 'KS' }
                ]
            }
        ];

        let leftSelected = new Set();
        let rightSelected = new Set();
        let rightData = [];

        function init() {
            renderLeft();
            renderRight();
            updateStats();
        }

        function renderLeft() {
            const container = document.getElementById('leftList');
            const searchTerm = document.getElementById('leftSearch').value.toLowerCase();
            container.innerHTML = '';

            sourceData.forEach(team => {
                const availableMembers = team.members.filter(m => !rightData.some(r => r.memberId === m.id));
                const teamMatch = team.name.toLowerCase().includes(searchTerm);
                const filteredMembers = team.members.filter(m => 
                    m.name.toLowerCase().includes(searchTerm) || m.role.toLowerCase().includes(searchTerm)
                );

                if (!teamMatch && filteredMembers.length === 0 && searchTerm) return;

                const teamDiv = document.createElement('div');
                teamDiv.className = 'team-item';
                
                const header = document.createElement('div');
                header.className = 'team-header';
                header.onclick = (e) => {
                    if (!e.target.closest('.td-checkbox')) toggleTeamExpand(team.id);
                };

                const teamChecked = availableMembers.length > 0 && availableMembers.every(m => leftSelected.has(m.id));
                const teamIndeterminate = availableMembers.some(m => leftSelected.has(m.id)) && !teamChecked;

                header.innerHTML = `
                    <svg class="team-arrow ${team.expanded ? 'expanded' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                    <label class="td-checkbox" onclick="event.stopPropagation()">
                        <input type="checkbox" ${teamChecked ? 'checked' : ''} ${availableMembers.length === 0 ? 'disabled' : ''} onchange="toggleTeam('${team.id}')">
                        <div class="td-checkbox-inner"></div>
                    </label>
                    <div class="team-name ${availableMembers.length === 0 ? 'disabled' : ''}">
                        <svg class="team-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span class="truncate">${team.name}</span>
                    </div>
                    <span class="team-count">${availableMembers.length}/${team.members.length}</span>
                `;

                const checkbox = header.querySelector('input');
                if (teamIndeterminate) checkbox.indeterminate = true;

                teamDiv.appendChild(header);

                if (team.expanded) {
                    const membersDiv = document.createElement('div');
                    membersDiv.className = 'member-list';
                    const displayMembers = searchTerm && !teamMatch ? filteredMembers : team.members;

                    displayMembers.forEach(member => {
                        const isInRight = rightData.some(r => r.memberId === member.id);
                        const isSelected = leftSelected.has(member.id);
                        
                        const memberDiv = document.createElement('div');
                        memberDiv.className = `member-item ${isSelected ? 'selected' : ''} ${isInRight ? 'disabled' : ''}`;
                        if (!isInRight) {
                            memberDiv.onclick = (e) => {
                                if (!e.target.closest('.td-checkbox')) toggleMember(member.id);
                            };
                        }

                        memberDiv.innerHTML = `
                            <label class="td-checkbox" onclick="event.stopPropagation()">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} ${isInRight ? 'disabled' : ''} onchange="toggleMember('${member.id}')">
                                <div class="td-checkbox-inner"></div>
                            </label>
                            <div class="member-avatar">${member.avatar}</div>
                            <div class="member-info">
                                <div class="member-name">
                                    <span class="truncate">${member.name}</span>
                                    <span class="member-role">${member.role}</span>
                                </div>
                                <div class="member-email truncate">${member.email}</div>
                            </div>
                            ${isInRight ? '<span class="member-status">已选</span>' : ''}
                        `;
                        membersDiv.appendChild(memberDiv);
                    });
                    teamDiv.appendChild(membersDiv);
                }
                container.appendChild(teamDiv);
            });

            updateLeftCount();
            updateButtons();
        }

        function renderRight() {
            const container = document.getElementById('rightList');
            const searchTerm = document.getElementById('rightSearch').value.toLowerCase();
            container.innerHTML = '';

            if (rightData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div class="empty-title">暂无选择的成员</div>
                        <div class="empty-desc">请从左侧选择团队或成员</div>
                    </div>
                `;
                updateRightCount();
                updateButtons();
                return;
            }

            const grouped = {};
            rightData.forEach(item => {
                if (!grouped[item.teamId]) grouped[item.teamId] = { teamName: item.teamName, members: [] };
                grouped[item.teamId].members.push(item);
            });

            Object.entries(grouped).forEach(([teamId, team]) => {
                if (searchTerm && !team.teamName.toLowerCase().includes(searchTerm) && 
                    !team.members.some(m => m.member.name.toLowerCase().includes(searchTerm))) return;

                const groupDiv = document.createElement('div');
                groupDiv.className = 'selected-group';

                const header = document.createElement('div');
                header.className = 'selected-group-header';
                header.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--td-brand-color);">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="selected-group-title">${team.teamName}</span>
                    <span class="selected-group-count">${team.members.length}人</span>
                `;
                groupDiv.appendChild(header);

                const membersDiv = document.createElement('div');
                membersDiv.className = 'selected-members';
                
                team.members.forEach(item => {
                    if (searchTerm && !item.member.name.toLowerCase().includes(searchTerm) && 
                        !item.member.role.toLowerCase().includes(searchTerm)) return;

                    const isSelected = rightSelected.has(item.memberId);
                    const memberDiv = document.createElement('div');
                    memberDiv.className = `selected-member-item ${isSelected ? 'active' : ''}`;
                    memberDiv.onclick = (e) => {
                        if (!e.target.closest('.remove-btn')) toggleRightSelection(item.memberId);
                    };

                    memberDiv.innerHTML = `
                        <label class="td-checkbox" onclick="event.stopPropagation()">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleRightSelection('${item.memberId}')">
                            <div class="td-checkbox-inner"></div>
                        </label>
                        <div class="member-avatar success">${item.member.avatar}</div>
                        <div class="member-info">
                            <div class="member-name">${item.member.name}</div>
                            <div class="member-email">${item.member.role} · ${item.member.email}</div>
                        </div>
                        <button class="remove-btn" onclick="removeMember('${item.memberId}')" title="移除">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6 6 18M6 6l12 12"/>
                            </svg>
                        </button>
                    `;
                    membersDiv.appendChild(memberDiv);
                });
                
                groupDiv.appendChild(membersDiv);
                container.appendChild(groupDiv);
            });

            updateRightCount();
            updateButtons();
        }

        function toggleTeamExpand(teamId) {
            const team = sourceData.find(t => t.id === teamId);
            if (team) {
                team.expanded = !team.expanded;
                renderLeft();
            }
        }

        function toggleTeam(teamId) {
            const team = sourceData.find(t => t.id === teamId);
            const availableMembers = team.members.filter(m => !rightData.some(r => r.memberId === m.id));
            const allSelected = availableMembers.every(m => leftSelected.has(m.id));
            
            if (allSelected) {
                availableMembers.forEach(m => leftSelected.delete(m.id));
            } else {
                availableMembers.forEach(m => leftSelected.add(m.id));
            }
            renderLeft();
        }

        function toggleMember(memberId) {
            if (leftSelected.has(memberId)) {
                leftSelected.delete(memberId);
            } else {
                leftSelected.add(memberId);
            }
            renderLeft();
        }

        function toggleRightSelection(memberId) {
            if (rightSelected.has(memberId)) {
                rightSelected.delete(memberId);
            } else {
                rightSelected.add(memberId);
            }
            renderRight();
        }

        function addSelected() {
            if (leftSelected.size === 0) return;
            leftSelected.forEach(memberId => {
                for (let team of sourceData) {
                    const member = team.members.find(m => m.id === memberId);
                    if (member && !rightData.some(r => r.memberId === memberId)) {
                        rightData.push({ teamId: team.id, memberId: member.id, teamName: team.name, member: member });
                    }
                }
            });
            leftSelected.clear();
            renderLeft();
            renderRight();
            updateStats();
        }

        function addAll() {
            sourceData.forEach(team => {
                team.members.forEach(member => {
                    if (!rightData.some(r => r.memberId === member.id)) {
                        rightData.push({ teamId: team.id, memberId: member.id, teamName: team.name, member: member });
                    }
                });
            });
            leftSelected.clear();
            renderLeft();
            renderRight();
            updateStats();
        }

        function removeSelected() {
            if (rightSelected.size === 0) return;
            rightData = rightData.filter(item => !rightSelected.has(item.memberId));
            rightSelected.clear();
            renderRight();
            updateStats();
        }

        function removeMember(memberId) {
            rightData = rightData.filter(item => item.memberId !== memberId);
            rightSelected.delete(memberId);
            renderRight();
            updateStats();
        }

        function removeAll() {
            rightData = [];
            rightSelected.clear();
            renderRight();
            updateStats();
        }

        function updateButtons() {
            document.getElementById('btnAdd').disabled = leftSelected.size === 0;
            document.getElementById('btnRemove').disabled = rightSelected.size === 0;
        }

        function updateLeftCount() {
            const available = sourceData.reduce((sum, t) => sum + t.members.filter(m => !rightData.some(r => r.memberId === m.id)).length, 0);
            document.getElementById('leftCount').textContent = available;
        }

        function updateRightCount() {
            document.getElementById('rightCount').textContent = rightData.length;
        }

        function updateStats() {
            const teams = new Set(rightData.map(r => r.teamId)).size;
            document.getElementById('totalTeams').textContent = teams;
            document.getElementById('totalMembers').textContent = rightData.length;
        }

        function filterLeft() { renderLeft(); }
        function filterRight() { renderRight(); }

        function expandAllTeams() {
            sourceData.forEach(t => t.expanded = true);
            renderLeft();
        }

        function collapseAllTeams() {
            sourceData.forEach(t => t.expanded = false);
            renderLeft();
        }

        function confirmSelection() {
            if (rightData.length === 0) {
                alert('请至少选择一名成员');
                return;
            }
            console.log('已选择：', rightData);
            alert(`成功选择 ${rightData.length} 名成员，来自 ${new Set(rightData.map(r => r.teamId)).size} 个团队`);
        }

        function cancelSelection() {
            if (confirm('确定要取消选择吗？所有已选数据将被清空。')) {
                removeAll();
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
